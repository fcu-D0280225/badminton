  <!-- Window cross bars -->
  <line x1="172" y1="258" x2="172" y2="316" stroke="white" stroke-width="5"/>
  <line x1="136" y1="287" x2="208" y2="287" stroke="white" stroke-width="5"/>
  <line x1="340" y1="258" x2="340" y2="316" stroke="white" stroke-width="5"/>
  <line x1="304" y1="287" x2="376" y2="287" stroke="white" stroke-width="5"/>

